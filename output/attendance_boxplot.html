
<style>
  .chart-wrap { padding: 1.5rem 1rem 1rem; font-family: var(--font-sans); }
  .annotation-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .anno-chip { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); }
  .anno-chip.highlight { background: #EFF6FF; color: #1E40AF; border-color: #BFDBFE; font-weight: 500; }
</style>

<div class="chart-wrap">
  <div class="annotation-row">
    <span class="anno-chip">Low &lt; 60%</span>
    <span class="anno-chip">Mid 60–80%</span>
    <span class="anno-chip">High &gt; 80%</span>
    <span class="anno-chip highlight">Key Zone : Low → Mid  +9.25점 (p &lt; 0.001)</span>
  </div>
  <canvas id="boxChart" style="width:100%;max-height:360px"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const groups = [
  {
    label: 'Low\n(출석 < 60%)',
    color: '#F87171',
    borderColor: '#DC2626',
    min: 20, q1: 45, median: 56, q3: 68, max: 88,
    mean: 56,
  },
  {
    label: 'Mid\n(60–80%)',
    color: '#60A5FA',
    borderColor: '#2563EB',
    min: 28, q1: 55, median: 65, q3: 76, max: 96,
    mean: 65,
  },
  {
    label: 'High\n(출석 > 80%)',
    color: '#34D399',
    borderColor: '#059669',
    min: 22, q1: 63, median: 72, q3: 83, max: 100,
    mean: 72,
  },
];

const PADDING = 20;
const canvas = document.getElementById('boxChart');

function drawChart() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.offsetWidth || 600;
  const H = 340;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const textColor = isDark ? '#CBD5E1' : '#475569';
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const axisColor = isDark ? '#475569' : '#CBD5E1';

  const leftPad = 52, rightPad = 20, topPad = 20, bottomPad = 56;
  const chartW = W - leftPad - rightPad;
  const chartH = H - topPad - bottomPad;

  const minScore = 0, maxScore = 110;
  const toY = v => topPad + chartH - ((v - minScore) / (maxScore - minScore)) * chartH;

  // grid lines
  [0, 20, 40, 60, 80, 100].forEach(v => {
    const y = toY(v);
    ctx.beginPath();
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 4]);
    ctx.moveTo(leftPad, y);
    ctx.lineTo(leftPad + chartW, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = textColor;
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(v, leftPad - 8, y + 4);
  });

  // y axis label
  ctx.save();
  ctx.translate(13, topPad + chartH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = textColor;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('시험 성적 (exam_score)', 0, 0);
  ctx.restore();

  const boxW = Math.min(72, chartW / 5);
  const slotW = chartW / groups.length;

  groups.forEach((g, i) => {
    const cx = leftPad + slotW * i + slotW / 2;

    // whisker
    ctx.beginPath();
    ctx.strokeStyle = g.borderColor;
    ctx.lineWidth = 1.5;
    ctx.moveTo(cx, toY(g.min));
    ctx.lineTo(cx, toY(g.max));
    ctx.stroke();

    // whisker caps
    [g.min, g.max].forEach(v => {
      ctx.beginPath();
      ctx.moveTo(cx - boxW * 0.25, toY(v));
      ctx.lineTo(cx + boxW * 0.25, toY(v));
      ctx.strokeStyle = g.borderColor;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // box fill
    const yQ3 = toY(g.q3), yQ1 = toY(g.q1);
    ctx.fillStyle = g.color + (i === 0 ? '55' : i === 1 ? '66' : '55');
    ctx.strokeStyle = g.borderColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(cx - boxW / 2, yQ3, boxW, yQ1 - yQ3, 4);
    ctx.fill();
    ctx.stroke();

    // median line
    ctx.beginPath();
    ctx.strokeStyle = g.borderColor;
    ctx.lineWidth = 2.5;
    ctx.moveTo(cx - boxW / 2, toY(g.median));
    ctx.lineTo(cx + boxW / 2, toY(g.median));
    ctx.stroke();

    // mean dot
    ctx.beginPath();
    ctx.arc(cx, toY(g.mean), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = g.borderColor;
    ctx.lineWidth = 2;
    ctx.fill();
    ctx.stroke();

    // median label
    ctx.fillStyle = g.borderColor;
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`중앙값 ${g.median}`, cx, toY(g.median) - 8);

    // x label
    const lines = g.label.split('\n');
    ctx.fillStyle = textColor;
    ctx.font = '12px sans-serif';
    lines.forEach((line, li) => {
      ctx.fillText(line, cx, H - bottomPad + 18 + li * 16);
    });
  });

  // Key Zone arrow Low → Mid
  const x0 = leftPad + slotW * 0 + slotW / 2 + boxW / 2 + 6;
  const x1 = leftPad + slotW * 1 + slotW / 2 - boxW / 2 - 6;
  const arrowY = toY(56) - 24;

  ctx.beginPath();
  ctx.strokeStyle = '#2563EB';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 3]);
  ctx.moveTo(x0, arrowY);
  ctx.lineTo(x1 - 8, arrowY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.fillStyle = '#2563EB';
  ctx.moveTo(x1, arrowY);
  ctx.lineTo(x1 - 10, arrowY - 5);
  ctx.lineTo(x1 - 10, arrowY + 5);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#2563EB';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('+9.25점', (x0 + x1) / 2, arrowY - 8);
}

drawChart();
window.addEventListener('resize', drawChart);
</script>
