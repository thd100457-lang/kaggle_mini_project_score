
<style>
  body { margin: 0; }
  .chart-wrap { padding: 1.5rem 1rem 1rem; font-family: var(--font-sans); }
  .legend-row { display: flex; gap: 16px; margin-bottom: 1.25rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
</style>

<div class="chart-wrap">
  <div class="legend-row">
    <div class="legend-item"><div class="legend-dot" style="background:#2563EB"></div>정책 개입 가능 변수</div>
    <div class="legend-item"><div class="legend-dot" style="background:#94A3B8"></div>기타 변수</div>
  </div>
  <canvas id="chart" style="width:100%;max-height:320px"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const features = [
  { label: '기타',              value: 0.03, controllable: false },
  { label: '수면 시간',          value: 0.03, controllable: false },
  { label: '교육 시설 만족도',    value: 0.04, controllable: false },
  { label: '학습 방법',          value: 0.06, controllable: true  },
  { label: '수면의 질',          value: 0.07, controllable: false },
  { label: '수업 출석률',        value: 0.15, controllable: true  },
  { label: '학습 시간',          value: 0.62, controllable: true  },
];

new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: features.map(f => f.label),
    datasets: [{
      data: features.map(f => f.value),
      backgroundColor: features.map(f => f.controllable ? '#2563EB' : '#CBD5E1'),
      borderRadius: 4,
      borderSkipped: false,
      barThickness: 28,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: true,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` 중요도: ${ctx.raw.toFixed(2)}`
        }
      },
      datalabels: { display: false }
    },
    scales: {
      x: {
        min: 0,
        max: 0.75,
        grid: { color: 'rgba(148,163,184,0.15)' },
        ticks: {
          color: '#94A3B8',
          font: { size: 11 },
          callback: v => v.toFixed(2)
        },
        border: { display: false }
      },
      y: {
        grid: { display: false },
        ticks: {
          color: ctx => features[ctx.index]?.controllable ? '#1E40AF' : '#64748B',
          font: ctx => ({
            size: 13,
            weight: features[ctx.index]?.controllable ? '500' : '400'
          })
        },
        border: { display: false }
      }
    },
    animation: {
      duration: 700,
      easing: 'easeOutQuart'
    }
  },
  plugins: [{
    afterDatasetsDraw(chart) {
      const { ctx, data } = chart;
      chart.getDatasetMeta(0).data.forEach((bar, i) => {
        const val = data.datasets[0].data[i];
        const isCtrl = features[i].controllable;
        ctx.save();
        ctx.fillStyle = isCtrl ? '#1E40AF' : '#94A3B8';
        ctx.font = `${isCtrl ? '600' : '400'} 12px sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(val.toFixed(2), bar.x + 6, bar.y);
        ctx.restore();
      });
    }
  }]
});
</script>
